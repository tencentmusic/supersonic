server:
  servlet:
    context-path:
  port: 9081

spring:
  profiles:
    active: ${S2_DB_TYPE:h2}
  application:
    name: headless
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  quartz:
    job-store-type: jdbc
    # Quartz DDL is provisioned by Flyway (V24) for MySQL/Postgres and by
    # schema-quartz-h2.sql for H2; keep autoconfig from trying to initialise.
    jdbc:
      initialize-schema: never
    overwrite-existing-jobs: false
    wait-for-jobs-to-complete-on-shutdown: true
    properties:
      org.quartz.scheduler.instanceName: SuperSonicScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.scheduler.batchTriggerAcquisitionMaxCount: 1
      # Do NOT set org.quartz.jobStore.class here — Spring's SchedulerFactoryBean injects
      # LocalDataSourceJobStore (a JobStoreCMT subclass) via putIfAbsent when dataSource is set.
      # Explicitly setting JobStoreTX bypasses Spring's datasource injection and causes startup failure.
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 20000
      org.quartz.jobStore.misfireThreshold: 60000
      org.quartz.jobStore.useProperties: false
      org.quartz.threadPool.class: org.quartz.simpl.SimpleThreadPool
      org.quartz.threadPool.threadCount: 5
      org.quartz.threadPool.threadPriority: 5
      org.quartz.threadPool.makeThreadsDaemons: true

authentication:
  enable: true
  exclude:
    path: /api/auth/user/register,/api/auth/user/login
  token:
    http:
      header:
        key: Authorization
