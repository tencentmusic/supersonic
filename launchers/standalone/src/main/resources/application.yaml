server:
  port: 9080
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/javascript,application/json,application/xml,text/html,text/xml,text/plain,text/css,image/*

spring:
  profiles:
    active: ${S2_DB_TYPE:h2}
  application:
    name: chat
  config:
    import:
      - classpath:s2-config.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      # password: ${REDIS_PASSWORD}  # uncomment if your Redis requires authentication
      # Sentinel mode (uncomment and set values):
      # sentinel:
      #   master: ${REDIS_SENTINEL_MASTER:mymaster}
      #   nodes: ${REDIS_SENTINEL_NODES:host1:26379,host2:26379,host3:26379}
      # Cluster mode (uncomment and set values):
      # cluster:
      #   nodes: ${REDIS_CLUSTER_NODES:host1:6379,host2:6379,host3:6379}
      #   max-redirects: 3
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org.quartz.scheduler.instanceName: SuperSonicScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 15000
      org.quartz.jobStore.misfireThreshold: 60000
      org.quartz.threadPool.threadCount: 5
mybatis:
  mapper-locations=classpath:mappers/custom/*.xml,classpath*:/mappers/*.xml

logging:
  level:
    dev.langchain4j: DEBUG
    dev.ai4j.openai4j: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
  packages-to-scan: com.tencent.supersonic
  paths-to-match: /api/chat/**,/api/semantic/**

knife4j:
  enable: true
  openapi:
    title: 'SuperSonic API Documentation'
    description: 'SuperSonic API Documentation'
    version: v1.0
  setting:
    language: zh-CN
#  basic:
#    enable: true
#    username: test
#    password: 123456#
  documents:
    default:
      title: ChatBI API Documents
      description: ChatBI API Documents

# SuperSonic configuration
s2:
  # OAuth storage configuration (redis or caffeine, default: caffeine)
  oauth:
    storage:
      type: ${S2_OAUTH_STORAGE_TYPE:redis}
  # Permission configuration
  permission:
    sensitive:
      # Whether MID sensitive level requires authorization (default: false)
      # If true, MID level fields will be treated like HIGH level
      mid-level-require-auth: false
      # Whether to log access to MID sensitive level fields (default: true)
      log-mid-level-access: true
  # Multi-tenant configuration
  tenant:
    enabled: true
    required: false
    default-tenant-id: 1
    header-enabled: true
    tenant-id-header: X-Tenant-Id
    subdomain-enabled: false
    excluded-tables:
      # Global system tables (no tenant isolation needed)
      - s2_tenant
      - s2_subscription_plan
      - s2_system_config
      - s2_oauth_provider
      - s2_oauth_state
      - s2_auth_groups
      # RBAC tables (permissions are global, roles can be tenant-specific)
      - s2_permission
      - s2_role_permission
      # Tables that achieve tenant isolation through foreign key relationships
      # Chat related (via chat_id -> s2_chat or agent_id -> s2_agent)
      - s2_chat_query
      - s2_chat_statistics
      - s2_chat_memory
      - s2_chat_config
      - s2_chat_context
      - s2_chat_parse
      - s2_plugin
      # Model/Domain related (via model_id -> s2_model or domain_id -> s2_domain)
      - s2_dimension
      - s2_metric
      - s2_model_rela
      - s2_tag
      - s2_tag_object
      - s2_query_rule
      - s2_term
      - s2_canvas
      - s2_query_stat_info
      - s2_dictionary_conf
      - s2_dictionary_task
      - s2_available_date_info
      - s2_collect
      - s2_metric_query_default_config
      # Report execution (via schedule_id -> s2_report_schedule)
      - s2_report_execution
      # Export task (via user_id)
      - s2_export_task
      # Data sync execution (via sync_config_id -> s2_data_sync_config)
      - s2_data_sync_execution
      # User related (via user_id -> s2_user)
      - s2_oauth_token
      - s2_refresh_token
      - s2_user_session
      - s2_user_token
      - s2_app
    excluded-paths:
      # Pre-authentication endpoints (no tenant context available yet)
      - /api/auth/user/login
      - /api/auth/user/register
      - /api/auth/oauth/**
      - /api/auth/token/**
      # Admin endpoints (cross-tenant operations)
      - /api/auth/admin/**
      - /api/admin/tenant/**
      # Public endpoints
      - /api/public/**
      # Health and monitoring
      - /health
      - /actuator/**
  # Export configuration
  export:
    worker-threads: 3
    max-queue-size: 50
    sync-threshold: 5000
    file-expire-days: 7
    storage-type: local
    local-dir: ${java.io.tmpdir}/supersonic-export
  # Report execution configuration
  report:
    max-concurrent-per-tenant: 3
  # Data sync configuration
  data-sync:
    max-concurrent-per-tenant: 2
    max-full-sync-per-dataset: 1