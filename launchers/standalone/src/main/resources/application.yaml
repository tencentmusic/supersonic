server:
  port: 9080
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/javascript,application/json,application/xml,text/html,text/xml,text/plain,text/css,image/*

spring:
  profiles:
    active: ${S2_DB_TYPE:h2}
    include: ${S2_ENV:dev}
  application:
    name: chat
  lifecycle:
    timeout-per-shutdown-phase: 30s
  task:
    execution:
      thread-name-prefix: supersonic-task-
  config:
    import:
      - classpath:s2-config.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      # password: ${REDIS_PASSWORD}  # uncomment if your Redis requires authentication
      # Sentinel mode (uncomment and set values):
      # sentinel:
      #   master: ${REDIS_SENTINEL_MASTER:mymaster}
      #   nodes: ${REDIS_SENTINEL_NODES:host1:26379,host2:26379,host3:26379}
      # Cluster mode (uncomment and set values):
      # cluster:
      #   nodes: ${REDIS_CLUSTER_NODES:host1:6379,host2:6379,host3:6379}
      #   max-redirects: 3
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: embedded
    properties:
      org.quartz.scheduler.instanceName: SuperSonicScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 15000
      org.quartz.jobStore.misfireThreshold: 60000
      org.quartz.threadPool.threadCount: 5

  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: ${EMAIL_SMTP_AUTH:true}
          connectiontimeout: ${EMAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${EMAIL_TIMEOUT:5000}
          writetimeout: ${EMAIL_WRITE_TIMEOUT:5000}
          starttls:
            enable: ${EMAIL_STARTTLS_ENABLE:false}
            required: ${EMAIL_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${EMAIL_SSL_ENABLE:false}

mybatis:
  mapper-locations=classpath:mappers/custom/*.xml,classpath*:/mappers/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: supersonic

logging:
  level:
    dev.langchain4j: DEBUG
    dev.ai4j.openai4j: DEBUG
    com.tencent.supersonic.feishu: DEBUG
    com.lark.oapi: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
  packages-to-scan: com.tencent.supersonic
  paths-to-match: /api/chat/**,/api/semantic/**

knife4j:
  enable: true
  openapi:
    title: 'SuperSonic API Documentation'
    description: 'SuperSonic API Documentation'
    version: v1.0
  setting:
    language: zh-CN
#  basic:
#    enable: true
#    username: test
#    password: 123456#
  documents:
    default:
      title: ChatBI API Documents
      description: ChatBI API Documents

# SuperSonic configuration
s2:
  # OAuth storage configuration (redis or caffeine, default: caffeine)
  oauth:
    storage:
      type: ${S2_OAUTH_STORAGE_TYPE:redis}
  # Permission configuration
  permission:
    sensitive:
      # Whether MID sensitive level requires authorization (default: false)
      # If true, MID level fields will be treated like HIGH level
      mid-level-require-auth: false
      # Whether to log access to MID sensitive level fields (default: true)
      log-mid-level-access: true
  # Multi-tenant configuration
  tenant:
    enabled: true
    required: false
    default-tenant-id: 1
    header-enabled: true
    tenant-id-header: X-Tenant-Id
    subdomain-enabled: false
    excluded-tables:
      # Global system tables (no tenant isolation needed)
      - s2_tenant
      - s2_subscription_plan
      - s2_system_config
      - s2_oauth_provider
      - s2_oauth_state
      - s2_auth_groups
      # RBAC tables (permissions are global, roles can be tenant-specific)
      - s2_permission
      - s2_role_permission
      # Tables that achieve tenant isolation through foreign key relationships
      # Chat related (via chat_id -> s2_chat or agent_id -> s2_agent)
      - s2_chat_query
      - s2_chat_statistics
      - s2_chat_memory
      - s2_chat_config
      - s2_chat_context
      - s2_chat_parse
      - s2_plugin
      # Model/Domain related (via model_id -> s2_model or domain_id -> s2_domain)
      - s2_dimension
      - s2_metric
      - s2_model_rela
      - s2_tag
      - s2_tag_object
      - s2_query_rule
      - s2_term
      - s2_canvas
      - s2_query_stat_info
      - s2_dictionary_conf
      - s2_dictionary_task
      - s2_available_date_info
      - s2_collect
      - s2_metric_query_default_config
      # Report execution (via schedule_id -> s2_report_schedule)
      - s2_report_execution
      # Export task (via user_id)
      - s2_export_task
      # Data sync execution (via sync_config_id -> s2_data_sync_config)
      - s2_data_sync_execution
      # User related (via user_id -> s2_user)
      - s2_oauth_token
      - s2_refresh_token
      - s2_user_session
      - s2_user_token
      - s2_app
      # Feishu bot (openId is globally unique, tenant resolved via mapped s2_user)
      - s2_feishu_user_mapping
      - s2_feishu_query_session
    excluded-paths:
      # Pre-authentication endpoints (no tenant context available yet)
      - /api/auth/user/login
      - /api/auth/user/register
      - /api/auth/oauth/**
      - /api/auth/token/**
      # Feishu webhook (unauthenticated, tenant resolved in FeishuBotService)
      - /api/feishu/webhook
      # Admin endpoints (cross-tenant operations)
      - /api/auth/admin/**
      - /api/admin/tenant/**
      # Public endpoints
      - /api/public/**
      # Health and monitoring
      - /health
      - /actuator/**
  # Feishu bot configuration
  feishu:
    enabled: ${FEISHU_ENABLED:false}
    # Connection mode: "webhook" (HTTP callback, requires public URL) or "ws" (WebSocket long connection, recommended)
    connection-mode: ${FEISHU_CONNECTION_MODE:ws}
    # SuperSonic API base URL for internal HTTP calls (standalone mode uses localhost)
    api-base-url: ${FEISHU_API_BASE_URL:http://localhost:${server.port:9080}}
    # Feishu app credentials — defined in profile-specific yaml (application-dev.yaml, application-prd.yaml)
    # Default agent ID used for NL2SQL queries from Feishu
    default-agent-id: ${FEISHU_DEFAULT_AGENT_ID:7}
    query-timeout-ms: ${FEISHU_QUERY_TIMEOUT_MS:30000}
    max-table-rows: ${FEISHU_MAX_TABLE_ROWS:20}
    user-mapping:
      auto-match-enabled: ${FEISHU_AUTO_MATCH_ENABLED:true}
      match-fields: ${FEISHU_MATCH_FIELDS:EMPLOYEE_ID,EMAIL,MOBILE}
    export:
      max-rows: ${FEISHU_EXPORT_MAX_ROWS:100000}
    cache:
      type: ${FEISHU_CACHE_TYPE:redis}  # caffeine or redis
  report-download:
    signing-secret: ${REPORT_DOWNLOAD_SIGNING_SECRET:${S2_ENCRYPTION_KEY:}}
    token-ttl-seconds: ${REPORT_DOWNLOAD_TOKEN_TTL_SECONDS:604800}
  # Export configuration
  export:
    worker-threads: 3
    max-queue-size: 50
    sync-threshold: 5000
    file-expire-days: 7
    storage-type: local
    local-dir: ${java.io.tmpdir}/supersonic-export
  # Report execution configuration
  report:
    max-concurrent-per-tenant: 3
  # SLO thresholds for template-report observability and alerts
  slo:
    report:
      success-rate-threshold: ${S2_SLO_REPORT_SUCCESS_RATE_THRESHOLD:0.95}
      execution-p95-threshold-ms: ${S2_SLO_REPORT_EXECUTION_P95_THRESHOLD_MS:10000}
      export-pending-threshold: ${S2_SLO_REPORT_EXPORT_PENDING_THRESHOLD:100}
      delivery-failure-rate-threshold: ${S2_SLO_REPORT_DELIVERY_FAILURE_RATE_THRESHOLD:0.05}
      delivery-retry-exhausted-threshold: ${S2_SLO_REPORT_DELIVERY_RETRY_EXHAUSTED_THRESHOLD:5}
  # Data sync configuration
  data-sync:
    max-concurrent-per-tenant: 2
    max-full-sync-per-dataset: 1
