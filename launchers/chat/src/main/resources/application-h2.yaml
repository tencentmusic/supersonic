spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:chat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false;QUERY_TIMEOUT=30
    username: root
    password: chat
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2-common.sql,classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2-common.sql
  h2:
    console:
      path: /h2-console/chat
      enabled: true
  flyway:
    enabled: false
