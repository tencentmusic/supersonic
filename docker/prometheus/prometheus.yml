global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "supersonic_alertmanager:9093"

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "supersonic-standalone"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["supersonic_standalone:9080"]
